<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research - Robotics Researcher Portfolio</title>
    <style>
        /* Theme with Fixed Background Image */
        body { 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
            color: #00ff00; 
            overflow: hidden; /* No scrolling needed for blank page */
            background-image: linear-gradient(rgba(5, 5, 5, 0.2), rgba(5, 5, 5, 0.3)), url('image_ce8666.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #050505;
        }

        /* Glassmorphism Navbar with Neon Bottom Border */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            box-sizing: border-box;
            background: rgba(5, 5, 5, 0.4); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            z-index: 1000;
        }

        .navbar .logo {
            font-size: 1.6em;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        
        .logo-moynul { color: #00ff00; } 
        .logo-rifat { color: #00ccff; } 

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 40px; 
            margin: 0;
            padding: 0;
        }

        .navbar ul li a {
            color: #a3a3a3;
            text-decoration: none;
            font-size: 1.1em;
            transition: 0.3s;
            padding-bottom: 5px; 
            position: relative;
        }

        .navbar ul li a:hover, .navbar ul li a.active {
            color: #00ff00;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.8);
        }

        .navbar ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 50%;
            background-color: #00ff00;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .navbar ul li a:hover::after, .navbar ul li a.active::after {
            width: 100%;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="logo-moynul">Moynul</span> <span class="logo-rifat">Rifat</span>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="research.html" class="active">Research</a></li>
            <li><a href="social.html">Social</a></li>
            <li><a href="about.html">About Me</a></li>
        </ul>
    </nav>

    </body>
</html>
